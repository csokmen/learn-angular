<div class="container">
  <header>
    <h1>{{ title }}</h1>
    <nav>
      <ul>
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a></li>
        <li><a routerLink="/posts" routerLinkActive="active">Posts</a></li>
        <li><a routerLink="/about" routerLinkActive="active">About</a></li>
      </ul>
    </nav>
  </header>

  <!-- Router outlet will display the component for the current route -->
  <router-outlet></router-outlet>

  <!-- This content will always be shown regardless of the route -->
  <footer>
    <p>Current date: {{ currentDate | date:'medium' }}</p>
  </footer>
</div>
